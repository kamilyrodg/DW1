<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar de Jogo</title>
    <link rel="stylesheet" href="Placar.css">
</head>
<body>
    <h1>Placar de Jogo</h1>

    <div class="container">
        <div class="team">
            <h2>Time A</h2>
            <p id="scoreA" class="score">0</p>
            <button onclick="addPoint('A')">+1 ponto</button>
        </div>

        <div class="team">
            <h2>Time B</h2>
            <p id="scoreB" class="score">0</p>
            <button onclick="addPoint('B')">+1 ponto</button>
        </div>
    </div>

    <button id="resetBtn" onclick="resetScore()">Resetar</button>

    <script src="Placar.js"></script>
</body>
</html>
